<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diagnóstico Elétrico</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        h1 {
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 12px;
            color: #0d47a1;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .radio-group,
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-group label,
        .checkbox-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="radio"],
        input[type="checkbox"] {
            transform: scale(1.2);
        }

        textarea.pequeno {
            min-height: 80px;
        }

        button {
            width: 100%;
            border: none;
            background: #1976d2;
            color: white;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1565c0;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>⚡ Diagnóstico Elétrico do Laboratório de Informática</h1>

        <form>

            <div class="card">
                <div class="form-group">
                    <label>Aluno</label>
                    <input type="text" id="aluno" name="aluno" autocorrect="name" autocapitalize="words">
                </div>

                <div class="form-group">
                    <label>Identificação do PC</label>
                    <input type="text" id="pc" name="pc" autocapitalize="characters">
                </div>
            </div>

            <div class="card">
                <h2>1. Tomada</h2>

                <div class="form-group">
                    <label>Possui 3 pinos (terra)?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="terra" value="sim"> Sim</label>
                        <label><input type="radio" name="terra" value="nao"> Não</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Estado físico</label>
                    <select name="estado_tomada">
                        <option value="">Selecione</option>
                        <option>Bom</option>
                        <option>Danificado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Quantidade de equipamentos conectados</label>
                    <input type="number" min="0" name="quantidadeEquipamentos" inputmode="numeric" required>
                </div>
            </div>

            <div class="card">
                <h2>2. Cabo de Força da Fonte (IEC)</h2>

                <div class="form-group">
                    <label>Polaridade da fase</label>

                    <div class="radio-group">
                        <label><input type="radio" name="fase" value="correta"> Sim — polaridade correta</label>

                        <label><input type="radio" name="fase" value="invertida"> Não — fase invertida</label>

                        <label><input type="radio" name="fase" value="nao_verificado"> Não verificado</label>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>3. Dispositivo Intermediário</h2>

                <div class="form-group">
                    <label>Tipo</label>

                    <select name="dispositivo">
                        <option value="">Selecione</option>
                        <option>Nenhum (ligação direta)</option>
                        <option>Extensão comum / Benjamim</option>
                        <option>Filtro de linha</option>
                        <option>Estabilizador</option>
                        <option>Nobreak (UPS)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Estado físico</label>

                    <select name="estado_dispositivo">
                        <option value="">Selecione</option>
                        <option>Bom</option>
                        <option>Danificado / Desgastado</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <h2>4. Fonte do Computador (PSU)</h2>

                <div class="form-group">
                    <label>Selo 80 Plus</label>
                    <select id="selo80plus" name="selo80plus">
                        <option value="Nenhum" selected>Nenhum</option>
                        <option value="80 Plus Bronze">80 Plus Bronze</option>
                        <option value="80 Plus Silver">80 Plus Silver</option>
                        <option value="80 Plus Gold">80 Plus Gold</option>
                        <option value="80 Plus Platinum">80 Plus Platinum</option>
                        <option value="80 Plus Titanium">80 Plus Titanium</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Possui chave 110/220V?</label>

                    <select name="possuiChave" id="possuiChave">
                        <option value="">Selecione</option>
                        <option value="Sim">Sim</option>
                        <option value="Não (PFC ativo provável)">Não (PFC ativo provável)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Posição da chave</label>
                    <select name="posicaoChave" id="posicaoChave">
                        <option value="">Selecione</option>
                        <option value="110V">110V</option>
                        <option value="220V">220V</option>
                        <option value="Não se aplica">Não se aplica</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Potência declarada (W)</label>
                    <input type="number" name="potencia" min="0" inputmode="numeric" required>
                </div>

                <div class="form-group">
                    <label>Ventoinha gira ao ligar?</label>

                    <select name="ventoinha">
                        <option value="">Selecione</option>
                        <option>Sim</option>
                        <option>Não</option>
                        <option>Intermitente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Ruído anormal</label>
                    <textarea class="pequeno" name="ruido"
                        placeholder="Descreva o ruído observado, se houver"></textarea>
                </div>
            </div>

            <div class="card">
                <h2>5. Sintomas Relatados</h2>

                <div class="checkbox-group">

                    <label>
                        <input type="checkbox" name="desligaSozinho">
                        Desliga sozinho
                    </label>

                    <label>
                        <input type="checkbox" name="demoraLigar">
                        Demora para ligar
                    </label>

                    <label>
                        <input type="checkbox" name="telaPreta">
                        Tela preta sem motivo aparente
                    </label>

                    <label>
                        <input type="checkbox" name="falhaUsb">
                        Falha em portas USB
                    </label>

                    <label>
                        <input type="checkbox" id="nenhumSintoma" name="nenhumSintoma">
                        Nenhum sintoma relatado
                    </label>
                </div>

                <div class="form-group" style="margin-top:12px;">
                    <label>Detalhes das falhas USB</label>
                    <textarea class="pequeno" name="detalhesUSB"
                        placeholder="Informe quais portas apresentam falhas e os sintomas observados"></textarea>
                </div>

                <div class="form-group">
                    <label>Outro sintoma</label>
                    <textarea class="pequeno" name="outroSintoma"
                        placeholder="Descreva outros sintomas identificados"></textarea>
                </div>
            </div>

            <div class="card">
                <h2>6. Observações Gerais / Riscos Identificados</h2>

                <textarea class="pequeno" name="observacoes"></textarea>
            </div>

            <button type="button" id="btnSalvar">
                Salvar Diagnóstico
            </button>

        </form>

    </div>

</body>

<script>

    document
        .getElementById("btnSalvar")
        .addEventListener("click", salvarDiagnostico);

    function salvarDiagnostico() {

        const aluno = document
            .getElementById("aluno")
            .value
            .trim();

        if (!aluno) {
            alert("Informe o nome do aluno.");
            return;
        }

        const dados = {
            dataColeta: new Date().toLocaleString("pt-BR"),

            aluno: aluno,

            identificacaoPc:
                document.querySelector('[name="pc"]').value,

            tomada: {
                possuiTerra:
                    document.querySelector('input[name="terra"]:checked')?.value || "",

                estado:
                    document.querySelector('[name="estado_tomada"]').value,

                quantidadeEquipamentos:
                    document.querySelector('[name="quantidadeEquipamentos"]').value
            },

            caboFonte: {
                polaridade:
                    document.querySelector('input[name="fase"]:checked')?.value || ""
            },

            dispositivo: {
                tipo:
                    document.querySelector('[name="dispositivo"]').value,

                estado:
                    document.querySelector('[name="estado_dispositivo"]').value
            },

            fonte: {
                selo80plus:
                    document.querySelector('[name="selo80plus"]').value,

                possuiChave:
                    document.querySelector('[name="possuiChave"]').value,

                posicaoChave:
                    document.querySelector('[name="posicaoChave"]').value,

                potencia:
                    document.querySelector('[name="potencia"]').value,

                ventoinha:
                    document.querySelector('[name="ventoinha"]').value,

                ruido:
                    document.querySelector('[name="ruido"]').value
            },

            sintomas: {
                desligaSozinho:
                    document.querySelector('[name="desligaSozinho"]').checked,

                demoraLigar:
                    document.querySelector('[name="demoraLigar"]').checked,

                telaPreta:
                    document.querySelector('[name="telaPreta"]').checked,

                falhaUsb:
                    document.querySelector('[name="falhaUsb"]').checked,

                nenhumSintoma:
                    document.querySelector('[name="nenhumSintoma"]').checked,

                detalhesUsb:
                    document.querySelector('[name="detalhesUSB"]').value,

                outroSintoma:
                    document.querySelector('[name="outroSintoma"]').value
            },

            observacoes:
                document.querySelector('[name="observacoes"]').value
        };

        const blob = new Blob(
            [JSON.stringify(dados, null, 2)],
            { type: "application/json" }
        );

        const nomeArquivo = aluno
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-zA-Z0-9 ]/g, "")
            .trim()
            .replace(/\s+/g, "_");

        const link = document.createElement("a");

        link.href = URL.createObjectURL(blob);

        link.download = `${nomeArquivo}.json`;

        link.click();

        URL.revokeObjectURL(link.href);

        alert("Diagnóstico salvo com sucesso!");
    }

    const selo = document.getElementById("selo80plus");

    selo.addEventListener("change", atualizarFonte);

    function atualizarFonte() {

        const possuiChave = document.querySelector('[name="possuiChave"]');
        const posicaoChave = document.querySelector('[name="posicaoChave"]');

        if (!possuiChave || !posicaoChave) return;

        if (selo.value !== "Nenhum") {

            possuiChave.value = "Não (PFC ativo provável)";
            controlarChaveFonte
            posicaoChave.value = "Não se aplica";

            possuiChave.disabled = true;
            posicaoChave.disabled = true;

        } else {

            possuiChave.value = "";
            posicaoChave.value = "";

            possuiChave.disabled = false;
            posicaoChave.disabled = false;
        }
    }

    const possuiChave = document.getElementById("possuiChave");
    const posicaoChave = document.getElementById("posicaoChave");

    possuiChave.addEventListener("change", controlarChaveFonte);

    function controlarChaveFonte() {

        if (possuiChave.value === "Não (PFC ativo provável)") {

            posicaoChave.value = "Não se aplica";
            posicaoChave.disabled = true;

        }
        else if (possuiChave.value === "Sim") {

            posicaoChave.disabled = false;

            // Limpa seleção anterior
            if (posicaoChave.value === "" || posicaoChave.value === "Não se aplica") {
                posicaoChave.value = "110V";
            }

            // Move o foco para o campo
            posicaoChave.focus();            
        }
        else {

            posicaoChave.disabled = false;
            posicaoChave.value = "";
        }
    }

    const nenhumSintoma = document.getElementById("nenhumSintoma");

    const sintomas = [
        document.querySelector('[name="desligaSozinho"]'),
        document.querySelector('[name="demoraLigar"]'),
        document.querySelector('[name="telaPreta"]'),
        document.querySelector('[name="falhaUsb"]'),

    ];

    // campos de texto que precisam ser limpos
    const camposTextoSintomas = [
        document.querySelector('[name="detalhesUSB"]'),
        document.querySelector('[name="outroSintoma"]')
    ];

    nenhumSintoma.addEventListener("change", controlarSintomas);

    function controlarSintomas() {

        if (nenhumSintoma.checked) {

            // desmarca e desabilita checkboxes
            sintomas.forEach(cb => {
                if (cb) {
                    cb.checked = false;
                    cb.disabled = true;
                }
            });

            // limpa e desabilita textareas
            camposTextoSintomas.forEach(campo => {
                if (campo) {
                    campo.value = "";
                    campo.disabled = true;
                }
            });

        } else {
            // reabilita checkboxes
            sintomas.forEach(cb => {
                if (cb) {
                    cb.disabled = false;
                }
            });
            // reabilita textareas
            camposTextoSintomas.forEach(campo => {
                if (campo) {
                    campo.disabled = false;
                }
            });
        }
    }



</script>

</html>
