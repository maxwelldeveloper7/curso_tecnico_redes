<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildLab</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --surface2: #16213e;
            --surface3: #0d1b2a;
            --accent: #7c3aed;
            --accent2: #a855f7;
            --green: #22c55e;
            --red: #ef4444;
            --yellow: #eab308;
            --text: #e2e8f0;
            --muted: #64748b;
            --border: #2d2d4e;
            --lvl1: #22c55e;
            --lvl2: #eab308;
            --lvl3: #ef4444;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center
        }

        #app {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            display: flex;
            flex-direction: column
        }

        /* HEADER */
        .hdr {
            background: var(--surface);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--accent);
            position: sticky;
            top: 0;
            z-index: 10
        }

        .hdr-left {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .hdr-icon {
            width: 32px;
            height: 32px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px
        }

        .hdr-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--accent2)
        }

        .hdr-sub {
            font-size: 11px;
            color: var(--muted)
        }

        .lives {
            display: flex;
            gap: 4px
        }

        .heart {
            font-size: 16px;
            transition: all .3s
        }

        .heart.dead {
            filter: grayscale(1);
            opacity: .3
        }

        /* PROGRESS BAR */
        .prog-wrap {
            background: var(--surface);
            padding: 8px 16px 10px;
            border-bottom: 1px solid var(--border)
        }

        .prog-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px
        }

        .prog-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden
        }

        .prog-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width .4s ease
        }

        /* SCROLL CONTENT */
        .scroll {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 100px;
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        /* CARDS */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            transition: all .2s
        }

        .card-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--accent2);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .card-label .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent2)
        }

        /* MISSAO */
        .missao-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            line-height: 1.3
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid
        }

        .badge-focus {
            background: #1e1b4b;
            color: #818cf8;
            border-color: #4338ca
        }

        .badge-lvl1 {
            background: #052e16;
            color: var(--lvl1);
            border-color: #166534
        }

        .badge-lvl2 {
            background: #422006;
            color: var(--lvl2);
            border-color: #92400e
        }

        .badge-lvl3 {
            background: #450a0a;
            color: var(--lvl3);
            border-color: #991b1b
        }

        /* CPU CARD */
        .cpu-card {
            background: var(--surface2);
            border: 1px solid var(--accent);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .cpu-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0
        }

        .cpu-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 5px
        }

        .tags {
            display: flex;
            gap: 5px;
            flex-wrap: wrap
        }

        .tag {
            padding: 2px 7px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600
        }

        .tag-socket {
            background: #1e3a5f;
            color: #60a5fa
        }

        .tag-tdp {
            background: #2d1b4e;
            color: var(--accent2)
        }

        .tag-brand {
            background: #1a2e1a;
            color: #86efac
        }

        .tag-watt {
            background: #1a2e2e;
            color: #34d399
        }

        .tag-chipset {
            background: #1e1b2e;
            color: #a5b4fc
        }

        .tag-correct {
            background: #052e16;
            color: var(--green)
        }

        .tag-wrong {
            background: #450a0a;
            color: var(--red)
        }

        /* SECAO */
        .secao-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .secao-title .icon {
            font-size: 16px
        }

        /* OPCOES */
        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .opcao {
            background: var(--surface3);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all .2s;
            user-select: none;
            -webkit-tap-highlight-color: transparent
        }

        .opcao:active {
            transform: scale(.98)
        }

        .opcao.selected {
            border-color: var(--accent);
            background: #1e1b4b
        }

        .opcao.correct {
            border-color: var(--green);
            background: #052e16
        }

        .opcao.wrong {
            border-color: var(--red);
            background: #450a0a
        }

        .opcao.disabled {
            opacity: .5;
            cursor: default
        }

        .opcao-icon {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0
        }

        .opcao-info {
            flex: 1
        }

        .opcao-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text)
        }

        .opcao-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px
        }

        .opcao-check {
            font-size: 16px;
            margin-left: auto;
            flex-shrink: 0
        }

        /* DIAGNOSTICO */
        .diag {
            border-radius: 12px;
            padding: 14px;
            display: none;
            flex-direction: column;
            gap: 8px
        }

        .diag.show {
            display: flex
        }

        .diag.ok {
            background: #052e16;
            border: 1px solid #166534
        }

        .diag.fail {
            background: #1c0a0a;
            border: 1px solid #7f1d1d
        }

        .diag-title {
            font-size: 14px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .diag-item {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            font-size: 12px;
            line-height: 1.4;
            padding: 6px 8px;
            border-radius: 6px;
            background: rgba(0, 0, 0, .2)
        }

        .diag-item .ico {
            flex-shrink: 0;
            margin-top: 1px
        }

        .diag-acerto {
            color: #86efac
        }

        .diag-erro {
            color: #fca5a5
        }

        .diag-dica {
            color: #fde68a
        }

        /* FOOTER */
        .footer {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 420px;
            padding: 12px;
            background: linear-gradient(to top, var(--bg) 70%, transparent);
            z-index: 10
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all .2s;
            box-shadow: 0 4px 20px rgba(124, 58, 237, .4)
        }

        .btn-main:active {
            transform: scale(.97)
        }

        .btn-main:disabled {
            opacity: .4;
            cursor: default
        }

        .btn-main.next {
            background: linear-gradient(135deg, var(--green), #16a34a)
        }

        .btn-main.next {
            box-shadow: 0 4px 20px rgba(34, 197, 94, .3)
        }

        /* TELA FINAL */
        .tela-final {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            gap: 16px;
            min-height: 80vh;
            text-align: center
        }

        .tela-final.show {
            display: flex
        }

        .final-icon {
            font-size: 64px;
            animation: bounce .6s ease
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-10px)
            }
        }

        .final-title {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent2)
        }

        .final-sub {
            font-size: 14px;
            color: var(--muted);
            max-width: 280px;
            line-height: 1.5
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 300px
        }

        .stat-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            text-align: center
        }

        .stat-val {
            font-size: 24px;
            font-weight: 800;
            color: var(--accent2)
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px
        }

        .btn-restart {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px
        }

        /* TENTATIVAS */
        .tries {
            display: flex;
            gap: 5px;
            align-items: center;
            font-size: 11px;
            color: var(--muted)
        }

        .try-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent2);
            transition: all .3s
        }

        .try-dot.used {
            background: var(--red)
        }

        /* NIVEL BADGE */
        .nivel-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- HEADER -->
        <div class="hdr">
            <div class="hdr-left">
                <div class="hdr-icon">🔧</div>
                <div>
                    <div class="hdr-title">BuildLab</div>
                    <div class="hdr-sub" id="hdrSub">Questão 1/15 · Nível 1</div>
                </div>
            </div>
            <div class="lives" id="lives">
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
                <span class="heart">❤️</span>
            </div>
        </div>

        <!-- PROGRESS -->
        <div class="prog-wrap">
            <div class="prog-info">
                <span id="progLabel">Progresso</span>
                <span id="progPct">0%</span>
            </div>
            <div class="prog-bar">
                <div class="prog-fill" id="progFill" style="width:0%"></div>
            </div>
        </div>

        <!-- SCROLL AREA -->
        <div class="scroll" id="scroll">
            <!-- MISSAO -->
            <div class="card" id="cardMissao">
                <div class="card-label"><span class="dot"></span><span id="qLabel">QUESTÃO 1 · SOQUETE</span></div>
                <div class="missao-title" id="qEnunciado"></div>
                <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap" id="qBadges"></div>
            </div>

            <!-- CPU -->
            <div class="card" id="cardCPU">
                <div class="card-label"><span class="dot"></span>CPU DESTA QUESTÃO</div>
                <div class="cpu-card">
                    <div class="cpu-icon">🖥️</div>
                    <div>
                        <div class="cpu-name" id="cpuName"></div>
                        <div class="tags" id="cpuTags"></div>
                    </div>
                </div>
            </div>

            <!-- PLACAS -->
            <div id="secMobo" style="display:none">
                <div class="secao-title"><span class="icon">🔲</span> Placa-mãe</div>
                <div class="opcoes" id="opcoesMotherboard"></div>
            </div>

            <!-- FONTES -->
            <div id="secPSU" style="display:none">
                <div class="secao-title" style="margin-top:10px"><span class="icon">⚡</span> Fonte de Alimentação</div>
                <div class="opcoes" id="opcoesPSU"></div>
            </div>

            <!-- TENTATIVAS -->
            <div style="display:flex;align-items:center;justify-content:space-between;padding:0 2px" id="triesRow">
                <div class="tries">
                    <span>Tentativas:</span>
                    <span class="try-dot" id="t0"></span>
                    <span class="try-dot" id="t1"></span>
                    <span class="try-dot" id="t2"></span>
                </div>
                <span id="triesLabel" style="font-size:11px;color:var(--muted)">3 restantes</span>
            </div>

            <!-- DIAGNOSTICO -->
            <div class="diag" id="diag"></div>
        </div>

        <!-- FOOTER -->
        <div class="footer">
            <button class="btn-main" id="btnMain" onclick="handleBtn()">🔍 Analisar configuração</button>
        </div>

        <!-- TELA FINAL -->
        <div class="tela-final" id="telaFinal">
            <div class="final-icon" id="finalIcon"></div>
            <div class="final-title" id="finalTitle"></div>
            <div class="final-sub" id="finalSub"></div>
            <div class="stats-grid" id="statsGrid"></div>
            <button class="btn-restart" onclick="restart()">🔄 Jogar novamente</button>
        </div>
    </div>

        // ═══════════════════════════════════════════════════════

            {
                id: 14, nivel: 3, cpu: 2, tema: "integração", enunciado: "Monte um sistema com Ryzen 7 5800X: placa AM4 compatível e fonte com margem adequada.", foco: "Build AMD intermediário",
                opcoes: { mobo: [1, 4, 8], psu: [3, 4, 5] }, resposta: { mobo: 1, psu: 4 }
            },
            {
                id: 15, nivel: 3, cpu: 8, tema: "integração", enunciado: "Build final: Core i9-12900K precisa de placa LGA1700 e fonte de alta potência. Finalize.", foco: "Build extremo",
                opcoes: { mobo: [4, 7, 3], psu: [3, 4, 5] }, resposta: { mobo: 7, psu: 5 }
            },
        ];

        // ═══════════════════════════════════════════════════════
        // ESTADO
        // ═══════════════════════════════════════════════════════
        const state = {
            qIdx: 0, tries: 0, maxTries: 3, lives: 3,
            sel: { mobo: null, psu: null },
            answered: false, total: 0, correct: 0, totalTries: 0
        };

        // ═══════════════════════════════════════════════════════
        // ENGINE
        // ═══════════════════════════════════════════════════════
        function avaliar(q, sel) {
            const cpu = DB.cpus[q.cpu];
            const erros = [], acertos = [];

            // gabarito é a única fonte de verdade para valid
            let gabaritoOk = true;
            if (q.resposta.mobo && sel.mobo !== q.resposta.mobo) gabaritoOk = false;
            if (q.resposta.psu && sel.psu !== q.resposta.psu) gabaritoOk = false;

            // diagnóstico de soquete (explicativo, não decide valid)
            if (sel.mobo !== undefined) {
                const m = DB.mobos[sel.mobo];
                if (m.socket !== cpu.socket) {
                    erros.push({ tipo: "soquete", msg: `Soquete incompatível: ${m.name} usa ${m.socket}, mas ${cpu.name} exige ${cpu.socket}.` });
                } else if (sel.mobo !== q.resposta.mobo) {
                    // socket bate mas não é a placa do gabarito (questão de nível 3 pode ter isso)
                    erros.push({ tipo: "soquete", msg: `${m.name} é fisicamente compatível (${m.socket}), mas não é a combinação ideal para este cenário.` });
                } else {
                    acertos.push({ tipo: "soquete", msg: `Soquete correto! ${m.name} (${m.socket}) é compatível com ${cpu.name}.` });
                }
            }

            // diagnóstico de potência (explicativo, não decide valid)
            if (sel.psu !== undefined) {
                const p = DB.psus[sel.psu];
                const pRef = DB.psus[q.resposta.psu];
                if (sel.psu === q.resposta.psu) {
                    acertos.push({ tipo: "potência", msg: `Fonte correta! ${p.name} (${p.watts}W) oferece a margem ideal para o ${cpu.name} (TDP ${cpu.tdp}W).` });
                } else if (p.watts < pRef.watts) {
                    erros.push({ tipo: "potência", msg: `Fonte insuficiente: ${p.name} (${p.watts}W) não garante margem segura para ${cpu.name} (TDP ${cpu.tdp}W). Recomendado: mínimo ${pRef.watts}W.` });
                } else {
                    erros.push({ tipo: "potência", msg: `Fonte superdimensionada: ${p.name} (${p.watts}W) é excessiva para este sistema. A escolha correta é ${pRef.watts}W — menor custo, mesma segurança.` });
                }
            }

            return { valid: gabaritoOk, erros, acertos };
        }

        // ═══════════════════════════════════════════════════════
        // RENDER
        // ═══════════════════════════════════════════════════════
        function render() {
            const q = QUESTIONS[state.qIdx];
            const cpu = DB.cpus[q.cpu];
            const lvlColors = { 1: "lvl1", 2: "lvl2", 3: "lvl3" };
            const lvlNames = { 1: "Soquete", 2: "Potência", 3: "Integração" };

            // header
            document.getElementById("hdrSub").textContent = `Questão ${state.qIdx + 1}/15 · Nível ${q.nivel}`;

            // progress
            const pct = Math.round((state.qIdx / 15) * 100);
            document.getElementById("progFill").style.width = pct + "%";
            document.getElementById("progPct").textContent = pct + "%";
            document.getElementById("progLabel").textContent = `${state.correct} acerto${state.correct !== 1 ? "s" : ""}`;

            // lives
            const hearts = document.querySelectorAll(".heart");
            hearts.forEach((h, i) => h.classList.toggle("dead", i >= state.lives));

            // missao
            document.getElementById("qLabel").textContent = `QUESTÃO ${q.id} · ${q.tema.toUpperCase()}`;
            document.getElementById("qEnunciado").textContent = q.enunciado;
            const badges = document.getElementById("qBadges");
            badges.innerHTML = `
    <span class="badge badge-focus">🎯 ${q.foco}</span>
    <span class="badge badge-${lvlColors[q.nivel]}">Nível ${q.nivel}: ${lvlNames[q.nivel]}</span>
  `;

            // cpu
            document.getElementById("cpuName").textContent = cpu.name;
            document.getElementById("cpuTags").innerHTML = `
    <span class="tag tag-socket">Soquete ${cpu.socket}</span>
    <span class="tag tag-tdp">TDP ${cpu.tdp}W</span>
    <span class="tag tag-brand">${cpu.brand}</span>
  `;

            // opções
            const secMobo = document.getElementById("secMobo");
            const secPSU = document.getElementById("secPSU");

            if (q.opcoes.mobo) {
                secMobo.style.display = "block";
                document.getElementById("opcoesMotherboard").innerHTML = q.opcoes.mobo.map(id => {
                    const m = DB.mobos[id];
                    return `<div class="opcao ${state.sel.mobo === id ? "selected" : ""} ${state.answered ? "disabled" : ""}" 
        onclick="selecionar('mobo',${id})" id="mobo_${id}">
        <div class="opcao-icon">🔲</div>
        <div class="opcao-info">
          <div class="opcao-name">${m.name}</div>
          <div class="opcao-sub">
            <span class="tag tag-chipset">Chipset ${m.chipset}</span>&nbsp;
            <span class="tag tag-socket">Soquete ${m.socket}</span>
          </div>
        </div>
        <span class="opcao-check">${state.sel.mobo === id ? "🔵" : ""}</span>
      </div>`;
                }).join("");
            } else { secMobo.style.display = "none"; }

            if (q.opcoes.psu) {
                secPSU.style.display = "block";
                document.getElementById("opcoesPSU").innerHTML = q.opcoes.psu.map(id => {
                    const p = DB.psus[id];
                    return `<div class="opcao ${state.sel.psu === id ? "selected" : ""} ${state.answered ? "disabled" : ""}"
        onclick="selecionar('psu',${id})" id="psu_${id}">
        <div class="opcao-icon">⚡</div>
        <div class="opcao-info">
          <div class="opcao-name">${p.name}</div>
          <div class="opcao-sub"><span class="tag tag-watt">${p.watts}W</span></div>
        </div>
        <span class="opcao-check">${state.sel.psu === id ? "🔵" : ""}</span>
      </div>`;
                }).join("");
            } else { secPSU.style.display = "none"; }

            // tentativas
            for (let i = 0; i < 3; i++) {
                const d = document.getElementById("t" + i);
                d.classList.toggle("used", i < state.tries);
            }
            const rem = state.maxTries - state.tries;
            document.getElementById("triesLabel").textContent = `${rem} restante${rem !== 1 ? "s" : ""}`;

            // diag (reset)
            const diag = document.getElementById("diag");
            diag.className = "diag";
            diag.style.display = "none";

            // botão
            const btn = document.getElementById("btnMain");
            btn.className = "btn-main";
            btn.textContent = "🔍 Analisar configuração";
            btn.disabled = false;
        }

        function selecionar(tipo, id) {
            if (state.answered) return;
            state.sel[tipo] = id;
            render();
            // re-render seleção visual sem re-render total
            document.getElementById("scroll").scrollTop = document.getElementById("scroll").scrollTop;
        }

        function showDiag(result, q) {
            const diag = document.getElementById("diag");
            diag.style.display = "flex";
            diag.className = `diag show ${result.valid ? "ok" : "fail"}`;
            let html = `<div class="diag-title">${result.valid ? "✅ Configuração válida!" : "❌ Problemas encontrados"}</div>`;
            result.acertos.forEach(a => html += `<div class="diag-item diag-acerto"><span class="ico">💡</span><span>${a.msg}</span></div>`);
            result.erros.forEach(e => html += `<div class="diag-item diag-erro"><span class="ico">🔎</span><span>${e.msg}</span></div>`);
            if (!result.valid && state.tries < state.maxTries) {
                html += `<div class="diag-item diag-dica"><span class="ico">💬</span><span>Revise as especificações e tente novamente.</span></div>`;
            }
            diag.innerHTML = html;
            setTimeout(() => diag.scrollIntoView({ behavior: "smooth", block: "nearest" }), 100);
        }

        function markOpcoes(q, result) {
            if (!result.valid) return;
            // verde no correto, vermelho nos errados
            if (q.opcoes.mobo) {
                q.opcoes.mobo.forEach(id => {
                    const el = document.getElementById("mobo_" + id);
                    if (!el) return;
                    el.classList.remove("selected", "opcao");
                    if (id === q.resposta.mobo) { el.classList.add("opcao", "correct"); el.querySelector(".opcao-check").textContent = "✅"; }
                    else { el.classList.add("opcao", "disabled"); }
                });
            }
            if (q.opcoes.psu) {
                q.opcoes.psu.forEach(id => {
                    const el = document.getElementById("psu_" + id);
                    if (!el) return;
                    el.classList.remove("selected", "opcao");
                    if (id === q.resposta.psu) { el.classList.add("opcao", "correct"); el.querySelector(".opcao-check").textContent = "✅"; }
                    else { el.classList.add("opcao", "disabled"); }
                });
            }
        }

        function handleBtn() {
            const q = QUESTIONS[state.qIdx];
            const btn = document.getElementById("btnMain");

            if (state.answered) {
                // avançar
                state.qIdx++;
                state.answered = false;
                state.sel = { mobo: null, psu: null };
                state.tries = 0;
                if (state.qIdx >= 15) { showFinal(); return; }
                render();
                document.getElementById("scroll").scrollTop = 0;
                return;
            }

            // validar seleção
            const sel = {};
            if (q.opcoes.mobo) {
                if (!state.sel.mobo) { alert("Selecione uma placa-mãe."); return; }
                sel.mobo = state.sel.mobo;
            }
            if (q.opcoes.psu) {
                if (!state.sel.psu) { alert("Selecione uma fonte."); return; }
                sel.psu = state.sel.psu;
            }

            state.tries++;
            state.totalTries++;
            state.total++;

            const result = avaliar(q, sel);

            // update tentativas visual
            for (let i = 0; i < 3; i++) document.getElementById("t" + i).classList.toggle("used", i < state.tries);
            const rem = state.maxTries - state.tries;
            document.getElementById("triesLabel").textContent = `${rem} restante${rem !== 1 ? "s" : ""}`;

            if (result.valid) {
                state.correct++;
                state.answered = true;
                markOpcoes(q, { valid: true });
                showDiag(result, q);
                btn.className = "btn-main next";
                btn.textContent = state.qIdx < 14 ? "▶ Próxima questão" : "🏁 Ver resultado final";
                // bloqueia opções
                document.querySelectorAll(".opcao").forEach(el => el.classList.add("disabled"));
            } else {
                if (state.tries >= state.maxTries) {
                    // esgotou tentativas
                    state.lives = Math.max(0, state.lives - 1);
                    state.answered = true;
                    // mostra gabarito
                    if (q.opcoes.mobo) {
                        const el = document.getElementById("mobo_" + q.resposta.mobo);
                        if (el) { el.classList.add("correct"); el.querySelector(".opcao-check").textContent = "✅"; }
                    }
                    if (q.opcoes.psu) {
                        const el = document.getElementById("psu_" + q.resposta.psu);
                        if (el) { el.classList.add("correct"); el.querySelector(".opcao-check").textContent = "✅"; }
                    }
                    // update lives
                    document.querySelectorAll(".heart").forEach((h, i) => h.classList.toggle("dead", i >= state.lives));
                    // diag com gabarito
                    const diagEl = document.getElementById("diag");
                    diagEl.style.display = "flex";
                    diagEl.className = "diag show fail";
                    diagEl.innerHTML = `<div class="diag-title">💔 Tentativas esgotadas</div>
        <div class="diag-item diag-erro"><span>Você usou todas as tentativas. O gabarito correto foi destacado acima.</span></div>
        <div class="diag-item diag-dica"><span>💡 Revise a teoria sobre ${q.tema} e prossiga.</span></div>`;
                    setTimeout(() => diagEl.scrollIntoView({ behavior: "smooth", block: "nearest" }), 100);
                    btn.className = "btn-main next";
                    btn.textContent = state.qIdx < 14 ? "▶ Próxima questão" : "🏁 Ver resultado final";
                    document.querySelectorAll(".opcao").forEach(el => el.classList.add("disabled"));
                } else {
                    showDiag(result, q);
                    // feedback visual nos erros
                    if (q.opcoes.mobo && sel.mobo && sel.mobo !== q.resposta.mobo) {
                        const el = document.getElementById("mobo_" + sel.mobo);
                        if (el) { el.classList.add("wrong"); setTimeout(() => el.classList.remove("wrong", "selected"), 600); }
                    }
                    if (q.opcoes.psu && sel.psu && sel.psu !== q.resposta.psu) {
                        const el = document.getElementById("psu_" + sel.psu);
                        if (el) { el.classList.add("wrong"); setTimeout(() => el.classList.remove("wrong", "selected"), 600); }
                    }
                    state.sel = { mobo: null, psu: null };
                }
            }
        }

        function showFinal() {
            document.getElementById("scroll").style.display = "none";
            document.getElementById("progWrap") && (document.getElementById("progWrap").style.display = "none");
            document.querySelector(".footer").style.display = "none";
            const tela = document.getElementById("telaFinal");
            tela.classList.add("show");

            const pct = Math.round((state.correct / 15) * 100);
            let icon = "🏆", title = "Excelente!", sub = "Você domina montagem de PCs!";
            if (pct < 50) { icon = "📚"; title = "Continue estudando!"; sub = "Revise os conceitos de soquete e potência."; }
            else if (pct < 75) { icon = "👍"; title = "Bom progresso!"; sub = "Você está no caminho certo. Pratique mais!"; }

            document.getElementById("finalIcon").textContent = icon;
            document.getElementById("finalTitle").textContent = title;
            document.getElementById("finalSub").textContent = sub;
            document.getElementById("statsGrid").innerHTML = `
    <div class="stat-box"><div class="stat-val" style="color:var(--green)">${state.correct}</div><div class="stat-label">Acertos</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--red)">${15 - state.correct}</div><div class="stat-label">Erros</div></div>
    <div class="stat-box"><div class="stat-val">${pct}%</div><div class="stat-label">Aproveitamento</div></div>
    <div class="stat-box"><div class="stat-val" style="color:var(--accent2)">${state.lives}</div><div class="stat-label">Vidas restantes</div></div>
  `;
        }

        function restart() {
            Object.assign(state, { qIdx: 0, tries: 0, lives: 3, sel: { mobo: null, psu: null }, answered: false, total: 0, correct: 0, totalTries: 0 });
            document.getElementById("telaFinal").classList.remove("show");
            document.getElementById("scroll").style.display = "flex";
            document.querySelector(".footer").style.display = "block";
            render();
        }

        // init
        render();
    </script>
</body>

</html>
