<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="iso_shadow" x="-20%" y="-20%" width="150%" height="150%">
            <feDropShadow dx="-4" dy="12" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.15"/>
        </filter>

        <linearGradient id="tech_top" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#e2e8f0"/>
        </linearGradient>
        <linearGradient id="tech_side_1" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#94a3b8"/>
            <stop offset="100%" stop-color="#64748b"/>
        </linearGradient>
        <linearGradient id="tech_side_2" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#cbd5e1"/>
            <stop offset="100%" stop-color="#94a3b8"/>
        </linearGradient>

        <linearGradient id="wave_spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1d4ed8"/>
            <stop offset="25%" stop-color="#0891b2"/>
            <stop offset="50%" stop-color="#059669"/>
            <stop offset="75%" stop-color="#d97706"/>
            <stop offset="100%" stop-color="#b91c1c"/>
        </linearGradient>
    </defs>

    <g id="canvas_background">
        <rect width="1200" height="750" fill="#ffffff"/>
        <path d="M -100,150 L 1300,850 M -100,350 L 1300,1050 M 0,-50 L 1200,550" stroke="#e2e8f0" stroke-width="0.75"/>
    </g>

    <g id="layer_bottom_telemetry" transform="translate(0, 60)">
        <polygon points="100,450 1100,450 1000,540 0,540" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
        
        <line x1="80" y1="495" x2="1050" y2="495" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
        <polygon points="1050,490 1065,495 1050,500" fill="#334155"/>
        
        <g font-family="Courier New, monospace" font-size="22" fill="#0f172a" font-weight="bold" text-anchor="middle">
            <text x="140" y="535">300 kHz</text>
            <text x="340" y="535">100 MHz</text>
            <text x="540" y="535">600 MHz</text>
            <text x="760" y="535">2.4/5 GHz</text>
            <text x="980" y="535">300 THz</text>
            <text x="1050" y="470" font-size="20" fill="#475569" font-weight="normal" text-anchor="end">Frequência (Hz) ➔</text>
        </g>

        <g font-family="sans-serif" font-size="24" fill="#1e293b">
            <text x="60" y="590" fill="#1d4ed8" font-weight="bold">[BAIXA FREQUÊNCIA]</text>
            <text x="60" y="625" font-size="22" fill="#334155">▪ Maior alcance geográfico</text>
            <text x="60" y="660" font-size="22" fill="#334155">▪ Alta penetração em obstáculos</text>

            <text x="720" y="590" fill="#b91c1c" font-weight="bold">[ALTA FREQUÊNCIA]</text>
            <text x="720" y="625" font-size="22" fill="#334155">▪ Maior taxa de transferência</text>
            <text x="720" y="660" font-size="22" fill="#334155">▪ Alta atenuação estrutural</text>
        </g>
    </g>

    <g id="projection_lines" stroke="#0284c7" stroke-width="1.25" stroke-dasharray="4,6" opacity="0.4">
        <line x1="150" y1="555" x2="150" y2="300"/>
        <line x1="350" y1="555" x2="350" y2="400"/>
        <line x1="550" y1="555" x2="550" y2="400"/>
        <line x1="770" y1="555" x2="770" y2="400"/>
        <line x1="990" y1="555" x2="990" y2="400"/>
    </g>

    <g id="layer_middle_wave" transform="translate(50, -10)">
        <path d="
            M 60,370 
            C 100,290 130,450 170,370 
            C 210,290 250,450 290,370 
            C 325,300 360,440 395,370 
            C 430,300 465,440 500,370 
            C 530,310 560,430 590,370 
            C 620,310 650,430 680,370 
            C 705,315 730,425 755,370 
            C 780,315 805,425 830,370 
            C 850,320 870,420 890,370 
            C 910,320 930,420 950,370 
            C 965,325 980,415 995,370 
            C 1010,325 1025,415 1040,370 
            C 1052,330 1064,410 1076,370
            C 1088,330 1100,410 1112,370
            L 1130,370" 
        fill="none" stroke="url(#wave_spectrum)" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g id="layer_top_modules" filter="url(#iso_shadow)">
        
        <g id="mod_radio_am" transform="translate(50, 120)">
            <polygon points="0,60 40,30 40,120 0,150" fill="url(#tech_side_1)"/>
            <polygon points="40,30 170,50 170,140 40,120" fill="url(#tech_side_2)"/>
            <polygon points="0,60 40,30 170,50 130,80" fill="url(#tech_top)"/>
            <text x="85" y="80" font-family="Courier New" font-weight="bold" font-size="24" fill="#0f172a" text-anchor="middle">AM</text>
            <path d="M85,110 V95 M80,100 L85,95 L90,100" stroke="#1e293b" stroke-width="2.5" fill="none"/>
        </g>

        <g id="mod_radio_fm" transform="translate(250, 120)">
            <polygon points="0,60 40,30 40,120 0,150" fill="url(#tech_side_1)"/>
            <polygon points="40,30 170,50 170,140 40,120" fill="url(#tech_side_2)"/>
            <polygon points="0,60 40,30 170,50 130,80" fill="url(#tech_top)"/>
            <text x="85" y="80" font-family="Courier New" font-weight="bold" font-size="24" fill="#0f172a" text-anchor="middle">FM</text>
            <rect x="70" y="95" width="30" height="16" rx="1" fill="none" stroke="#1e293b" stroke-width="2.5"/>
        </g>

        <g id="mod_tv_digital" transform="translate(450, 120)">
            <polygon points="0,60 40,30 40,120 0,150" fill="url(#tech_side_1)"/>
            <polygon points="40,30 170,50 170,140 40,120" fill="url(#tech_side_2)"/>
            <polygon points="0,60 40,30 170,50 130,80" fill="url(#tech_top)"/>
            <text x="85" y="80" font-family="Courier New" font-weight="bold" font-size="24" fill="#0f172a" text-anchor="middle">TV</text>
            <path d="M70,95 H100 V110 H70 Z" fill="none" stroke="#1e293b" stroke-width="2.5"/>
        </g>

        <g id="mod_wifi_cellular" transform="translate(670, 120)">
            <polygon points="0,60 40,30 40,120 0,150" fill="url(#tech_side_1)"/>
            <polygon points="40,30 170,50 170,140 40,120" fill="url(#tech_side_2)"/>
            <polygon points="0,60 40,30 170,50 130,80" fill="url(#tech_top)"/>
            <text x="85" y="80" font-family="Courier New" font-weight="bold" font-size="22" fill="#0f172a" text-anchor="middle">WI-FI</text>
            <path d="M75,105 A 8,8 0 0,1 95,105 M78,101 A 5,5 0 0,1 92,101" fill="none" stroke="#1e293b" stroke-width="2.5"/>
        </g>

        <g id="mod_infrared" transform="translate(890, 120)">
            <polygon points="0,60 40,30 40,120 0,150" fill="url(#tech_side_1)"/>
            <polygon points="40,30 170,50 170,140 40,120" fill="url(#tech_side_2)"/>
            <polygon points="0,60 40,30 170,50 130,80" fill="url(#tech_top)"/>
            <text x="85" y="80" font-family="Courier New" font-weight="bold" font-size="24" fill="#0f172a" text-anchor="middle">IR</text>
            <path d="M70,100 H100" stroke="#b91c1c" stroke-width="3.5"/>
        </g>
    </g>

    <g id="outer_bounds" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5">
        <line x1="50" y1="180" x2="50" y2="555"/>
        <line x1="1050" y1="170" x2="1050" y2="555"/>
    </g>
</svg>
