<svg viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <linearGradient id="grad_cladding" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
            <stop offset="50%" stop-color="#a0c4ff" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
        </linearGradient>

        <linearGradient id="grad_core" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.05"/>
            <stop offset="50%" stop-color="#00d2ff" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#00d2ff" stop-opacity="0.05"/>
        </linearGradient>

        <radialGradient id="grad_arrows">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <g id="ambiente">
        <rect width="1000" height="500" fill="#070f24" />
        <path d="M0 250 H1000 M500 0 V500" stroke="#1a2b4a" stroke-width="1" opacity="0.5"/>
    </g>

    <g id="cladding_back">
        <path d="M150,150 L850,150 A50,100 0 0,1 850,350 L150,350" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    </g>

    <g id="core_structure">
        <rect x="150" y="210" width="700" height="80" fill="url(#grad_core)" stroke="#00d2ff" stroke-width="0.5" opacity="0.3"/>
        <ellipse cx="150" cy="250" rx="20" ry="40" fill="#00d2ff" opacity="0.1"/>
        <ellipse cx="850" cy="250" rx="20" ry="40" fill="#00d2ff" opacity="0.2" stroke="#00d2ff"/>
    </g>

    <g id="light_rays" filter="url(#glow)">
        <polyline id="ray_red" points="150,250 250,210 350,290 450,210 550,290 650,210 750,290 850,250" 
                  fill="none" stroke="#ff3333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <animate attributeName="stroke-dasharray" from="0,1000" to="1000,0" dur="3s" repeatCount="indefinite" />
        </polyline>

        <polyline id="ray_blue" points="150,250 200,230 300,270 400,230 500,270 600,230 700,270 800,230 850,250" 
                  fill="none" stroke="#00d2ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
            <animate attributeName="stroke-dashoffset" from="100" to="0" dur="2s" repeatCount="indefinite" />
            <animate attributeName="stroke-dasharray" values="10,5; 5,10; 10,5" dur="1s" repeatCount="indefinite" />
        </polyline>

        <polyline id="ray_yellow" points="150,250 280,215 410,285 540,215 670,285 800,215 850,250" 
                  fill="none" stroke="#ffea00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite" />
        </polyline>
    </g>

    <g id="cladding_front">
        <rect x="150" y="150" width="700" height="200" fill="url(#grad_cladding)" opacity="0.2" />
        <ellipse cx="150" cy="250" rx="30" ry="100" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
        <ellipse cx="850" cy="250" rx="30" ry="100" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
    </g>

    <g id="technical_labels" font-family="Arial, sans-serif" font-size="14" fill="#ffffff">
        <text x="890" y="145" text-anchor="start" font-weight="bold">Cladding</text>
        <text x="890" y="255" text-anchor="start" font-weight="bold">Multimode Core</text>
        
        <g transform="translate(860, 230)">
            <text x="50" y="-80" fill="#ff3333">Ray 1 (Red)</text>
            <text x="50" y="-50" fill="#00d2ff">Ray 2 (Blue)</text>
            <text x="50" y="-20" fill="#ffea00">Ray 3 (Yellow)</text>
            <path d="M0,20 L30,0 L0,-20 Z" fill="url(#grad_arrows)" transform="translate(10, 20) scale(0.8)"/>
        </g>

        <text x="500" y="450" text-anchor="middle" opacity="0.7">Zig-zag Mode Paths</text>
        
        <path d="M850,150 L885,142 M850,250 L885,250" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
    </g>
</svg>
